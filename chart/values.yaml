name: events-ingester

replicas: 1

image:
  repository: ghcr.io/krateoplatformops/events-ingester
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  automount: false


config:
  # Enable or disable debug logging
  DEBUG: "false"

  # Maximum time to wait for PostgreSQL to become ready
  DB_READY_TIMEOUT: "4m"

  # Database username
  # DB_USER: ""

  # Database password (prefer using a Secret)
  # DB_PASS: ""

  # Database host
  # DB_HOST: "localhost"

  # PostgreSQL port
  # DB_PORT: "5432"

  # Extra query parameters (e.g. sslmode=disable&connect_timeout=5)
  # DB_PARAMS: ""

  # Comma separated list of namespaces to watch for events
  # NAMESPACES: "krateo-system"

  PORT: "8082"


secret:
  create: false
  name: eventrouter-db


service:
  port: 8082


resources:
  requests:
    cpu: 100m
    memory: 128Mi

  limits:
    cpu: 500m
    memory: 256Mi

probes:
  readiness:
    path: /readyz
    initialDelaySeconds: 30
    periodSeconds: 60
  liveness:
    path: /livez
    initialDelaySeconds: 30
    periodSeconds: 60

